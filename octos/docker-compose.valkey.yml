services:
  valkey:
    image: valkey/valkey:9.0.3-alpine
    container_name: octos-valkey
    restart: unless-stopped
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:?set VALKEY_PASSWORD in your shell or .env}
    command:
      - sh
      - -c
      - |
        exec valkey-server \
          --bind 0.0.0.0 \
          --port 6379 \
          --protected-mode yes \
          --requirepass "$${VALKEY_PASSWORD}" \
          --appendonly yes \
          --appendfsync everysec \
          --save 900 1 \
          --save 300 10 \
          --save 60 10000 \
          --rename-command FLUSHALL "" \
          --rename-command FLUSHDB "" \
          --rename-command CONFIG "" \
          --rename-command DEBUG "" \
          --rename-command MODULE "" \
          --rename-command EVAL "" \
          --rename-command EVALSHA ""
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./valkey-data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$${VALKEY_PASSWORD}\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  internal-api:
    build:
      context: ./kernel
      dockerfile: Dockerfile
    container_name: octos-internal-api
    restart: unless-stopped
    environment:
      INTERNAL_API_ADDR: 0.0.0.0:9090
      VALKEY_ADDR: valkey:6379
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:?set VALKEY_PASSWORD in your shell or .env}
      KERNEL_HEAP_CAPACITY: 1024
      INTERNAL_API_SEED_SKILLS: ${INTERNAL_API_SEED_SKILLS:-}
    depends_on:
      valkey:
        condition: service_healthy
    ports:
      - "127.0.0.1:9090:9090"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
