<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skyra | Interact</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body class="interact-surface">
    <main class="interact-shell">
      <header class="interact-hero">
        <div>
          <p class="eyebrow">Human Surface</p>
          <h1>Talk to Skyra</h1>
          <p class="lede">Human-facing interaction only. No internal reasoning leaks into this surface.</p>
        </div>
        <nav class="surface-nav">
          <a href="/thoughts">Open Thought Stream</a>
        </nav>
      </header>

      <section class="conversation-panel">
        <div id="conversation" class="conversation-list"></div>
        <form id="composer" class="composer">
          <label class="composer-label" for="message">Message</label>
          <div class="composer-row">
            <textarea id="message" name="message" rows="3" placeholder="Say something to Skyra"></textarea>
            <button type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/assets/interact.js"></script>
  </body>
  </html>
