<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skyra | Thought Stream</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body class="thoughts-surface">
    <main class="thoughts-shell">
      <header class="thoughts-hero">
        <div>
          <p class="eyebrow">Chain of Thought</p>
          <h1>Internal Step Stream</h1>
          <p class="lede">Chronological raw output plus structured perception, active frame, and primitive choice.</p>
        </div>
        <nav class="surface-nav">
          <a href="/interact">Open Human Surface</a>
        </nav>
      </header>

      <section class="thought-grid">
	        <aside class="active-panel">
	          <h2>Active Step</h2>
	          <div id="active-step" class="active-step empty">No active step.</div>
	          <h2>Chain State</h2>
	          <pre id="chain-state" class="json-block">{}</pre>
	          <h2>Perception</h2>
	          <pre id="perception" class="json-block">{}</pre>
	        </aside>
        <section class="timeline-panel">
          <h2>Chronological Step Log</h2>
          <div id="timeline" class="timeline"></div>
        </section>
      </section>
    </main>

    <script src="/assets/thoughts.js"></script>
  </body>
  </html>
