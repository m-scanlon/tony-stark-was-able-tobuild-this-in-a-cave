services:
  kernel:
    build:
      context: .
      dockerfile: ./skyra/kernel/Dockerfile
    container_name: skyra-kernel
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      KERNEL_ADDR: 0.0.0.0:9090
      OLLAMA_GATEWAY_WS_URL: ${OLLAMA_GATEWAY_WS_URL:?set OLLAMA_GATEWAY_WS_URL}
      OLLAMA_GATEWAY_TOKEN: ${OLLAMA_GATEWAY_TOKEN:-}
      SKYRA_PROMPT_ROOT: /app/skyra/chain-of-thought/primtives
      KERNEL_HEAP_CAPACITY: ${KERNEL_HEAP_CAPACITY:-1024}
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    read_only: true
    tmpfs:
      - /tmp
