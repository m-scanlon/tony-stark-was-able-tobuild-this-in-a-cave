<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 64"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Skyra Horizon</title>
  <desc id="desc">
    Stylized horizon line rising into a gold loop with the Skyra wordmark.
  </desc>

  <g stroke-linecap="round" stroke-linejoin="round">
    <path
      d="M 10 30 Q 60 20, 110 35 T 190 30"
      stroke="#1E3A8A"
      stroke-width="4"
      fill="none"
    />
    <path
      d="M 110 35 Q 140 10, 170 35 Q 140 60, 110 35"
      fill="#F59E0B"
      stroke="#1E3A8A"
      stroke-width="3"
    />
    <path
      d="M 80 30 Q 100 15, 110 35"
      stroke="#1E3A8A"
      stroke-width="4"
      fill="none"
    />
  </g>

  <text
    x="10"
    y="56"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="24"
    font-weight="600"
    fill="#1E3A8A"
  >
    Skyra
  </text>
</svg>
